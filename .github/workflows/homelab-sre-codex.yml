name: Homelab SRE Codex

on:
  workflow_call:
    inputs:
      issue_number:
        required: true
        type: string
      issue_url:
        required: true
        type: string
      service_name:
        required: true
        type: string
      container_name:
        required: true
        type: string
      fingerprint:
        required: true
        type: string
      state_fingerprint:
        required: true
        type: string
      deployment_repo:
        required: true
        type: string
      deployment_path:
        required: true
        type: string
    secrets:
      openai-api-key:
        required: true
      sre-github-token:
        required: true

permissions:
  contents: write
  pull-requests: write
  issues: read

jobs:
  codex:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout caller repo
        uses: actions/checkout@v6

      - name: Fetch SRE issue context
        id: fetch_context
        env:
          GH_TOKEN: ${{ secrets.sre-github-token }}
        run: |
          mkdir -p .codex codex-output
          {
            echo ".codex/"
            echo "codex-output/"
          } >> .git/info/exclude
          {
            echo "# Homelab SRE Context"
            echo
            echo "- Issue URL: ${{ inputs.issue_url }}"
            echo "- Service: ${{ inputs.service_name }}"
            echo "- Container: ${{ inputs.container_name }}"
            echo "- Fingerprint: ${{ inputs.fingerprint }}"
            echo "- State fingerprint: ${{ inputs.state_fingerprint }}"
            echo "- Deployment repo: ${{ inputs.deployment_repo }}"
            echo "- Deployment path: ${{ inputs.deployment_path }}"
            echo
            echo "## Issue"
            gh issue view "${{ inputs.issue_number }}" \
              --repo "${{ github.repository }}" \
              --comments
          } > .codex/homelab-sre-context.md
          {
            echo "## Issue"
            echo
            echo "Related to ${{ inputs.issue_url }}."
            echo
            echo "This draft PR was opened by the homelab SRE workflow. Codex did not replace the fallback PR body."
            echo
            echo "## Root Cause"
            echo
            echo "- Not documented by Codex."
            echo
            echo "## Evidence"
            echo
            echo "- Not documented by Codex."
            echo
            echo "## Fix Logic"
            echo
            echo "- Not documented by Codex."
            echo
            echo "## Validation"
            echo
            echo "- Not documented by Codex."
            echo
            echo "## Risk"
            echo
            echo "- Review the diff carefully before merge."
          } > codex-output/sre-pr-body.md

      - name: Run Codex
        id: run_codex
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.openai-api-key }}
          model: gpt-5.5
          effort: medium
          safety-strategy: drop-sudo
          sandbox: workspace-write
          allow-bot-users: homelab-sre
          output-file: codex-output/codex-final-message.md
          prompt: |
            Investigate homelab SRE issue #${{ inputs.issue_number }}.

            Context:
            - Issue URL: ${{ inputs.issue_url }}
            - Service: ${{ inputs.service_name }}
            - Container: ${{ inputs.container_name }}
            - Fingerprint: ${{ inputs.fingerprint }}
            - State fingerprint: ${{ inputs.state_fingerprint }}
            - Deployment repo: ${{ inputs.deployment_repo }}
            - Deployment path: ${{ inputs.deployment_path }}

            Requirements:
            - Read `.codex/homelab-sre-context.md` before changing code.
            - Start from the SRE context and use targeted code search.
            - Do not scan the whole repo unless the evidence requires it.
            - Inspect the relevant code and tests.
            - Make the smallest plausible fix that directly addresses the triggering issue.
            - Add or update focused tests when possible.
            - Do not change unrelated behavior.
            - Do not make adjacent comment, documentation, or UX-only improvements unless they directly fix the triggering incident.
            - If you cannot identify a high-confidence code or configuration fix, leave the working tree clean except ignored `codex-output/` files and report investigation findings in your final response.
            - Update `codex-output/sre-pr-body.md` with a PR description specific to the issue and actual diff.
            - In the PR description, include `## Issue`, `## Root Cause`, `## Evidence`, `## Fix Logic`, `## Validation`, and `## Remaining Uncertainty`.
            - Include concise, reviewable reasoning grounded in issue context, code references, and test results. Do not include hidden chain-of-thought.
            - For bugs, explain the faulty logic, the evidence for that conclusion, and how the fix changes the logic.
            - For features, tools, or config changes, explain why the change is needed and what behavior it adds or changes.
            - Do not use auto-closing keywords such as "Closes", "Fixes", or "Resolves" unless validation shows the PR directly resolves the issue; otherwise use "Related to".
            - Do not leave generic "Automated draft PR" text in the PR description.
            - Summarize root cause, evidence, fix logic, validation, and remaining uncertainty in the final response.

      - name: Check code changes
        id: check_changes
        run: |
          if [ -n "$(git status --porcelain --untracked-files=all)" ]; then
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Report investigation without code changes
        if: ${{ steps.check_changes.outputs.has_changes == 'false' }}
        env:
          GH_TOKEN: ${{ secrets.sre-github-token }}
          ISSUE_NUMBER: ${{ inputs.issue_number }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          {
            echo "**homelab-sre-agent**"
            echo
            echo "Autofix investigation completed without code changes."
            echo
            echo "- Result: Codex did not identify a high-confidence code fix, so no draft PR was opened."
            echo "- Source repo: \`${{ github.repository }}\`"
            echo "- Issue: #${ISSUE_NUMBER}"
            echo "- Run: ${RUN_URL}"
            echo
            echo "## Investigation Findings"
            echo
            if [ -s codex-output/codex-final-message.md ]; then
              sed -e 's/\r$//' codex-output/codex-final-message.md
            else
              echo "Codex completed without a final message file."
            fi
          } > codex-output/no-change-comment.md
          gh issue comment "${ISSUE_NUMBER}" \
            --repo "${{ github.repository }}" \
            --body-file codex-output/no-change-comment.md

      - name: Create draft pull request
        if: ${{ steps.check_changes.outputs.has_changes == 'true' }}
        id: create_pr
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.sre-github-token }}
          branch: codex/sre-${{ inputs.issue_number }}-${{ inputs.fingerprint }}
          title: "SRE: investigate issue #${{ inputs.issue_number }}"
          body-path: codex-output/sre-pr-body.md
          draft: true

      - name: Report SRE workflow failure
        if: ${{ failure() }}
        env:
          GH_TOKEN: ${{ secrets.sre-github-token }}
          ISSUE_NUMBER: ${{ inputs.issue_number }}
          EXPECTED_BRANCH: codex/sre-${{ inputs.issue_number }}-${{ inputs.fingerprint }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          FETCH_CONTEXT_OUTCOME: ${{ steps.fetch_context.outcome || 'not_run' }}
          RUN_CODEX_OUTCOME: ${{ steps.run_codex.outcome || 'not_run' }}
          CHECK_CHANGES_OUTCOME: ${{ steps.check_changes.outcome || 'not_run' }}
          CREATE_PR_OUTCOME: ${{ steps.create_pr.outcome || 'not_run' }}
        run: |
          mkdir -p codex-output
          {
            echo "**homelab-sre-agent**"
            echo
            echo "Autofix workflow failed."
            echo
            echo "- Result: the GitHub Actions autofix run failed before completing draft PR creation."
            echo "- Source repo: \`${{ github.repository }}\`"
            echo "- Issue: #${ISSUE_NUMBER}"
            echo "- Expected branch: \`${EXPECTED_BRANCH}\`"
            echo "- Run: ${RUN_URL}"
            echo "- Step outcomes:"
            echo "  - Context fetch: \`${FETCH_CONTEXT_OUTCOME}\`"
            echo "  - Codex: \`${RUN_CODEX_OUTCOME}\`"
            echo "  - Change check: \`${CHECK_CHANGES_OUTCOME}\`"
            echo "  - Draft PR: \`${CREATE_PR_OUTCOME}\`"
            echo
            echo "Review the workflow run logs, fix the workflow or repo configuration, then dispatch autofix again."
          } > codex-output/sre-workflow-failure-comment.md
          gh issue comment "${ISSUE_NUMBER}" \
            --repo "${{ github.repository }}" \
            --body-file codex-output/sre-workflow-failure-comment.md
