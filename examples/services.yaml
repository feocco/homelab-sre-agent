defaults:
  issue_repo: feocco/homelab-config
  deploy_repo: feocco/homelab-config

services:
  plant-monitor:
    containers:
      - plant-monitor
      - plant-monitor-temporal
    images:
      - ghcr.io/feocco/plant-monitor:*
    source:
      repo: feocco/plant-monitor
      path_hint: /Users/feocco/code/plant-monitor
    issue_repo: feocco/plant-monitor
    deploy:
      path: plant-monitor
    runbook_url: https://github.com/feocco/homelab-config/tree/main/plant-monitor
    labels:
      - homelab-sre
      - plant-monitor
    sre:
      enabled: true
      # Eligible for approved autofix. The SRE agent still waits for the
      # sre:autofix-approved issue label before dispatching Codex.
      autofix: false
      repo_daily_limit: 5
      # Optional: route obvious dependency outages to phone notification +
      # local recurrence state instead of creating a source-repo issue.
      routing:
        operational_dependencies:
          - dependency: home-assistant
            pattern: "Cannot connect to host *.ui.nabu.casa"
            reason: "Home Assistant cloud endpoint is unavailable."
